# Enable Dependabot version bumps. Kept UNGROUPED so each PR carries a
# parseable "Bump X from A to B" title for the central auto-merger on
# fredrir/openclaw. See that repo: .github/workflows/dependabot-automerge.yml.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "ci(deps)" }
    open-pull-requests-limit: 5
