[window]
width = 640
max_results = 8
radius = 16
row_height = 52
opacity = 0.96   # bg alpha (0.0–1.0)

[behavior]
opening_animation = false   # opt in to KWin's opening animation
close_on_click_outside = true
close_on_focus_loss = true
frequency_ranking = true
# single_click: Use KDE's setting - (true/false)

[theme]
#   "auto"    (default)
#   "config" only config.toml
#   "kde"     only KDE
#   "custom"  only hex overrides below
source = "auto"
config_path = "~/.config/quicklaunch/config.toml"

# Example
# accent      = "#b4befe"
# background  = "#1e1e2e"
# text        = "#cdd6f4"
# muted       = "#9399b2"
# selection   = "#b4befe"
# placeholder = "#6c7086"

[font]
# family = "Inter"
size = 20

[icons]
size = 40
# theme:
# theme = "breeze-dark"
