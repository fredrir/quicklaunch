[window]
width = 640    # panel width in px
top_offset = 220    # distance from the top of the screen to the search bar
max_results = 8
radius = 16
row_height = 52     # height of each result row
opacity = 0.96   # panel background alpha (0.0–1.0)

[behavior]
close_on_click_outside = true
close_on_focus_loss = true
frequency_ranking = true   # boost frequently/recently launched apps
# single_click: Use KDE's setting, set true/false to override
# single_click = true

[theme]
# source = how colors are chosen:
#   "auto"    (default)
#   "palette" only palette.toml
#   "kde"     only KDE
#   "custom"  only hex overrides below
source = "auto"
palette_path = "~/.config/quicklaunch/palette.toml"

# Example
# accent      = "#b4befe"
# background  = "#1e1e2e"
# text        = "#cdd6f4"
# muted       = "#9399b2"
# selection   = "#b4befe"
# placeholder = "#6c7086"

[font]
# family = "Inter"
size = 20

[icons]
size = 40
# theme:
# theme = "breeze-dark"
